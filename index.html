                        alt="QR код">

                <!-- Инфо -->

                    <i id="shareBtn" class="fas fa-share-square" style="font-size: 28px; cursor: pointer;" title="Поделиться"></i>

<script>
document.getElementById('shareBtn').addEventListener('click', function() {
    const url = window.location.href;

    if (navigator.share) {
        navigator.share({
            title: 'Моя визитка',
            text: 'Смотри мою визитку',
            url: url
        }).catch(err => console.error(err));
    } else {
        // Для ПК
        prompt("Скопируй ссылку:", url);
    }
});
</script>
